name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-host:
    name: Python host (mypy + pytest)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.12']
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: host
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies (mock + dev extras; skip linux-only on macOS)
        run: |
          python -m pip install --upgrade pip
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update
            # libsystemd-dev is required by `systemd-python` (compiled
            # from sdist on the runner), libvirt-dev by `libvirt-python`.
            sudo apt-get install -y libvirt-dev libsystemd-dev pkg-config
            pip install -e ".[mock,dev,linux]"
          else
            pip install -e ".[mock,dev]"
          fi
      - name: ruff check
        # Bans `print()` (T201) per DEC-0006; backstop pycodestyle/
        # pyflakes/isort. Generated proto modules excluded via
        # pyproject `extend-exclude`.
        run: ruff check src/
      - name: mypy --strict
        # Verified locally on macOS Python 3.12: 0 issues across 32 source
        # files (commit 58dad5f). Enforced rather than tolerated.
        run: mypy --strict src/
      - name: pytest
        run: pytest -q

  rust-guest-cross-compile:
    name: Rust guest (cargo check + test on host arch)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
          components: clippy
      - name: Install MinGW (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - name: Install MinGW (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install mingw-w64
      - name: cargo check (Windows target)
        working-directory: guest
        run: cargo check --workspace --target x86_64-pc-windows-gnu
      - name: cargo test (host arch, mock feature where defined)
        working-directory: guest
        # `--features mock` enables mock implementations in crates that
        # define the feature (currently ipc-vsock; others to follow per
        # docs/CROSS_PLATFORM_DEV.md). Cargo silently ignores the flag
        # for crates without the feature, so the workspace builds fine.
        run: cargo test --workspace --features ipc-vsock/mock
      - name: cargo clippy
        working-directory: guest
        # Verified locally on macOS (commit on feat/initial-ci-green):
        # 0 warnings on x86_64-pc-windows-gnu after the cross-compile
        # warning cleanup. Enforced rather than tolerated.
        run: cargo clippy --workspace --target x86_64-pc-windows-gnu -- -D warnings

  rust-gui:
    name: Rust GUI (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Qt6
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-declarative-dev cmake ninja-build
      - name: cargo check
        working-directory: gui
        # Verified locally on macOS Apple Silicon — `cargo check --workspace`
        # green after cxx-qt 0.7 deps resolved. Linux runner needs the
        # Qt6 packages above; if dpkg names drift on a future Ubuntu image
        # we'll reintroduce continue-on-error and track in FOLLOWUPS.
        run: cargo check --workspace

  proto:
    name: Proto lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
      - name: buf lint
        working-directory: proto
        # Rules codified in proto/buf.yaml (STANDARD minus COMMENT_*).
        # Strict-enforced.
        run: buf lint
      - name: buf format check
        working-directory: proto
        # Diff-and-fail on any unformatted file. Run `buf format -w`
        # locally to normalise.
        run: buf format --diff --exit-code

  microbench:
    name: Microbench gate (N1.* perf regression check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: host
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[mock,dev]"
      - name: Run microbenchmarks
        working-directory: host
        # --benchmark-only: skip regular tests, run bench functions only.
        # --benchmark-json: emit machine-readable output for bench_check.py.
        # -q: suppress per-test output — the JSON file is the artefact.
        run: |
          python -m pytest benches/ \
            --benchmark-only \
            --benchmark-json=bench-results.json \
            -q
      - name: Check perf regression
        # bench_check.py exits 1 if any baseline-gated metric regresses by
        # >20%. 0-baseline entries are informational (collect-only) and
        # never fail. The baselines file is the single source of truth;
        # updates require a dedicated perf: PR.
        run: |
          python scripts/bench_check.py \
            --baseline .github/perf-baselines.json \
            --results host/bench-results.json

  i18n-extract:
    name: i18n string extraction check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt linguist tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q qttools5-dev-tools gettext
      - name: Install host dependencies (for xgettext to find imports)
        working-directory: host
        run: pip install -e ".[mock]" --quiet
      - name: Re-extract strings
        run: bash scripts/i18n.sh extract
      - name: Check .pot for uncommitted changes
        # Fails if xgettext produced new msgid entries not in the committed
        # .pot — signals that a developer added _("...") but didn't commit
        # the updated template.  Ignores POT-Creation-Date (frozen in
        # scripts/i18n.sh) and line-number comments which shift on
        # every reformat.
        run: |
          git diff --exit-code i18n/crossdesk-host.pot \
            || { echo "ERROR: i18n/crossdesk-host.pot has uncommitted changes."; \
                 echo "Run 'bash scripts/i18n.sh extract' and commit the result."; \
                 exit 1; }
      - name: Check Qt .ts for uncommitted changes
        run: |
          git diff --exit-code \
            gui/crates/crossdesk-gui/i18n/crossdesk_en.ts \
            gui/crates/crossdesk-gui/i18n/crossdesk_pl.ts \
            || { echo "ERROR: Qt .ts files have uncommitted changes."; \
                 echo "Run 'bash scripts/i18n.sh extract' and commit the result."; \
                 exit 1; }

  linux-kvm-smoke:
    name: Linux + KVM smoke (placeholder — needs self-hosted runner)
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'hardware-smoke')
    steps:
      - run: |
          echo "Hardware-bound smoke tests not yet wired."
          echo "Add a self-hosted runner with KVM access and remove this placeholder."
          exit 0
