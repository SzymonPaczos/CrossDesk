name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-host:
    name: Python host (mypy + pytest)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.12']
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: host
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
      - name: mypy --strict
        run: mypy --strict src/ || true  # tolerate until baseline established
      - name: pytest
        run: pytest -q

  rust-guest-cross-compile:
    name: Rust guest (cargo check + test on host arch)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install MinGW (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - name: Install MinGW (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install mingw-w64
      - name: cargo check (Windows target)
        working-directory: guest
        run: cargo check --workspace --target x86_64-pc-windows-gnu
      - name: cargo test (host arch, mock features)
        working-directory: guest
        run: cargo test --workspace --no-default-features --features mock || cargo test --workspace
      - name: cargo clippy
        working-directory: guest
        run: cargo clippy --workspace --target x86_64-pc-windows-gnu -- -D warnings
        continue-on-error: true  # warnings until baseline established

  rust-gui:
    name: Rust GUI (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Qt6
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-declarative-dev cmake ninja-build
      - name: cargo check
        working-directory: gui
        run: cargo check --workspace
        continue-on-error: true  # GUI deps may not yet be configured

  proto:
    name: Proto codegen sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
      - name: buf lint
        working-directory: proto
        run: buf lint || true
      - name: buf format check
        working-directory: proto
        run: buf format --diff --exit-code || true

  linux-kvm-smoke:
    name: Linux + KVM smoke (placeholder — needs self-hosted runner)
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'hardware-smoke')
    steps:
      - run: |
          echo "Hardware-bound smoke tests not yet wired."
          echo "Add a self-hosted runner with KVM access and remove this placeholder."
          exit 0
