# cargo-deny configuration for the guest workspace.
#
# Run: `cargo deny check`  (from the guest/ workspace root)
#
# CrossDesk ships under GPL-3.0-or-later. Direct + transitive deps are
# permitted only if their license is permissive (MIT, Apache-2.0, BSD,
# ISC, Unicode, Zlib, …) or copyleft-compatible with GPL-3 (LGPL-3,
# MPL-2.0). Anything stricter — AGPL, BUSL, SSPL, etc — would force
# downstream redistribution constraints we have not opted into and is
# rejected by omission from the allow-list below.
#
# The pre-push hook runs `cargo deny check --hide-inclusion-graph`
# automatically when cargo-deny is on PATH (see .githooks/pre-push and
# docs/AUDIT_REPORT.md "How to re-run"). The same check runs on every
# push and PR via .github/workflows/security.yml.

# -----------------------------------------------------------------------
# Advisories — RustSec database integration.
# -----------------------------------------------------------------------
#
# Defaults from cargo-deny 0.19: vulnerability = deny, yanked = warn,
# notice = warn, unmaintained + unsound = deny. We tighten yanked →
# deny so a yanked dep blocks the push. Each entry in `ignore` MUST
# carry a one-line justification + a re-evaluation trigger (typically
# "until <upstream> ships <fix>").
[advisories]
yanked = "deny"
ignore = [
    # rustls-pemfile is unmaintained as of 2025-08; tonic 0.12 still
    # depends on it transitively. Re-evaluate after bumping tonic to
    # 0.13+ (which migrated to rustls-pki-types).
    "RUSTSEC-2025-0134",
]

# -----------------------------------------------------------------------
# Licenses — explicit allow-list, deny-by-omission.
# -----------------------------------------------------------------------
[licenses]
allow = [
    # First-party + first-party-compatible copyleft.
    "GPL-3.0",
    "GPL-3.0-or-later",
    "LGPL-3.0-or-later",
    "MPL-2.0",
    # Standard permissive set used across the Rust ecosystem.
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "BSL-1.0",
    # OpenSSL is needed for transitive deps that link or vendor it.
    "OpenSSL",
]
confidence-threshold = 0.8
exceptions = []

# -----------------------------------------------------------------------
# Bans — multiple-version + wildcard policy.
# -----------------------------------------------------------------------
#
# multiple-versions starts as "warn" so we can see the duplicate graph
# without blocking pushes; tightening to "deny" is queued in
# FOLLOWUPS once the windows-sys / wit-bindgen duplicates are resolved
# upstream (currently dragged in by tonic-build → prost-build).
#
# wildcards = "allow" because our internal crates use `path = "../foo"`
# without a version field. They are workspace-pinned, not version-
# resolved, so the wildcard is the intended shape.
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

# -----------------------------------------------------------------------
# Sources — only crates.io + (no) git remotes.
# -----------------------------------------------------------------------
#
# All deps must come from crates.io. Git deps are not yet whitelisted;
# add a github.com entry to `allow-git` if a deliberate fork ever
# becomes necessary. unknown-* set to "deny" so an accidental private
# registry or unpinned git dep fails the check.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
