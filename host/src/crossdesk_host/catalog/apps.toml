# CrossDesk built-in app catalog.
#
# Ported from third_party/winapps/apps/ — executable paths, MIME types,
# and category strings are taken verbatim from the WinApps info files.
# Each entry maps to an AppEntry dataclass in catalog/schema.py.
#
# Format:
#   [[apps]]
#   app_id          = "<kebab-slug>"       # unique identifier
#   name            = "<display name>"
#   win_executable  = '<Windows path>'     # single-quotes to avoid escaping
#   categories      = ["<category>", ...]  # freedesktop categories
#   mime_types      = ["<mime>", ...]      # may be empty
#   icon            = "<icon-name>"        # empty string = no icon hint

# ---------------------------------------------------------------------------
# Microsoft Office (Office 2016/365 root layout)
# ---------------------------------------------------------------------------

[[apps]]
app_id = "word"
name = "Microsoft Word"
win_executable = 'C:\Program Files\Microsoft Office\Office16\WINWORD.EXE'
categories = ["Office"]
mime_types = [
    "application/msword",
    "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
    "application/vnd.openxmlformats-officedocument.wordprocessingml.template",
    "application/vnd.ms-word.document.macroEnabled.12",
    "application/vnd.ms-word.template.macroEnabled.12",
]
icon = "ms-word"

