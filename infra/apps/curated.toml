# Curated tier — pre-tested app templates shipped with the host package.
#
# Each entry is loaded at first launch (or on `crossdesk apps reload`)
# into ~/.local/share/crossdesk/apps/curated/<id>.json and surfaced
# in the Manager's Apps pane. MIME types listed here are also
# consumed by `xdg-mime default` so .docx → Word "just works".
#
# Compatibility stars (0-5):
#   5 — works flawlessly across all tested Win10/Win11 builds
#   4 — minor issues (specific feature flagged in known_issues)
#   3 — usable but quirks
#   0 — unrated (placeholder; no community data yet)
#
# This file ports / extends third_party/winapps/apps/. Where WinApps
# only sets a name + exec path + MIMEs, we additionally curate
# compatibility stars and known_issues notes from real testing.

