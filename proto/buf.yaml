# buf v2 configuration for the crossdesk.v1 protobuf surface.
#
# Used by:
#   - .github/workflows/ci.yml `proto` job (`buf lint` + `buf format
#     --diff --exit-code`, both gating, no `|| true` since this config
#     was finalised).
#   - Local dev: `buf lint proto` and `buf format proto -w` if `buf` is
#     on PATH (install: https://buf.build/docs/installation).
#
# We do NOT ship a buf.gen.yaml: host code is generated by
# `host/build_proto.py` (grpc_tools.protoc + mypy-protobuf) and guest
# code by `guest/crates/proto/build.rs` (tonic-build with vendored
# protoc). Both are committed entrypoints; switching to `buf generate`
# would duplicate generation pipelines without payoff.

version: v2

modules:
  - path: .
    name: buf.build/crossdesk/proto

# Lint policy.
#
# STANDARD bundles every category up to and including service-suffix,
# RPC-suffix, enum-value-prefix, and package-version-suffix conventions.
# We opt out of the COMMENT_* family because the existing .proto files
# carry block-comment headers on the public-facing surface (services,
# top-level messages) but not on every individual field — a deliberate
# style choice (the comment headers explain intent; per-field comments
# would be noise on self-describing names like `Rect.x`).
#
# When a new .proto lands without a header on a service/message/enum,
# buf lint will still flag it via the structural rules (PACKAGE_*,
# *_PASCAL_CASE, FIELD_LOWER_SNAKE_CASE, etc).
lint:
  use:
    - STANDARD
  except:
    - COMMENT_ENUM
    - COMMENT_ENUM_VALUE
    - COMMENT_FIELD
    - COMMENT_MESSAGE
    - COMMENT_ONEOF
    - COMMENT_RPC
    - COMMENT_SERVICE

# Wire-compat policy.
#
# FILE is the strictest tier: any change inside a single .proto file
# that would break a client recompiling against the new descriptors
# (field number reuse, type swap, removed field, renamed message at the
# wire level, etc) is rejected.  This is stricter than WIRE_JSON, which
# is in turn stricter than WIRE — the task brief asked for "at minimum
# WIRE_JSON" and FILE satisfies that floor.
#
# Run via `buf breaking proto --against '.git#branch=main'` in CI on
# every PR. Pre-merge gate.
breaking:
  use:
    - FILE
